    - redis
    - rabbitmq
    healthcheck:
      test:
      - CMD
      - wget
      - --quiet
      - --tries=1
      - --spider
      - http://localhost:8000/health
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
    - journey-net
    image: 127.0.0.1:5000/analytics-service:latest
    deploy:
      replicas: 2
volumes:
  rabbitmq_data: null
  rabbitmq_data_2: null
  rabbitmq_data_3: null
  redis_data: null
  pg_users_data: null
  pg_users_replica_data: null
  pg_journeys_data: null
  pg_journeys_replica_data: null
  pg_conflicts_data: null
  pg_conflicts_replica_data: null
  pg_analytics_data: null
