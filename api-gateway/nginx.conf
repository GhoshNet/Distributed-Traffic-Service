worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/json;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream=$upstream_addr response_time=$upstream_response_time';
    access_log /var/log/nginx/access.log main;

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    keepalive_timeout 65;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=booking:10m rate=10r/s;

    # Upstream service groups
    upstream user_service {
        server user-service:8000;
        keepalive 32;
    }

    upstream journey_service {
        server journey-service:8000;
        keepalive 32;
    }

    upstream conflict_service {
        server conflict-service:8000;
        keepalive 32;
    }

    upstream notification_service {
        server notification-service:8000;
        keepalive 32;
    }

    upstream enforcement_service {
        server enforcement-service:8000;
        keepalive 32;
    }

    upstream analytics_service {
        server analytics-service:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost;

        # Health check — proxies to journey-service so node failure simulation is visible externally.
        # If journey-service is simulating a crash (/health returns 503), remote peers will
        # detect this node as SUSPECT → DEAD through their health monitors.
        location = /health {
            proxy_pass http://journey_service/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 3s;
            proxy_read_timeout 5s;
        }

        # ==========================================
        # User Service Routes
        # ==========================================
        location /api/users/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://user_service/api/users/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # ==========================================
        # Journey Service Routes
        # ==========================================
        location /api/journeys/ {
            limit_req zone=booking burst=20 nodelay;
            proxy_pass http://journey_service/api/journeys/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # ==========================================
        # Conflict Service Routes (internal, but exposed for demo)
        # ==========================================
        location /api/conflicts/ {
            limit_req zone=general burst=10 nodelay;
            proxy_pass http://conflict_service/api/conflicts/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # ==========================================
        # Notification Service Routes
        # ==========================================
        location /api/notifications/ {
            limit_req zone=general burst=10 nodelay;
            proxy_pass http://notification_service/api/notifications/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # WebSocket support for notifications
        location /ws/notifications/ {
            proxy_pass http://notification_service/ws/notifications/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # ==========================================
        # Enforcement Service Routes
        # ==========================================
        location /api/enforcement/ {
            limit_req zone=general burst=20 nodelay;
            proxy_pass http://enforcement_service/api/enforcement/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # ==========================================
        # Analytics Service Routes
        # ==========================================
        location /api/analytics/ {
            limit_req zone=general burst=10 nodelay;
            proxy_pass http://analytics_service/api/analytics/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # ==========================================
        # Node health (ALIVE/SUSPECT/DEAD) — from journey-service health monitor
        # ==========================================
        location /health/nodes {
            limit_req zone=general burst=10 nodelay;
            proxy_pass http://journey_service/health/nodes;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $request_id;
        }

        location /health/partitions {
            limit_req zone=general burst=10 nodelay;
            proxy_pass http://journey_service/health/partitions;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $request_id;
        }

        # Dynamic peer registration (multi-device LAN/hotspot testing)
        location /admin/peers/ {
            limit_req zone=general burst=10 nodelay;
            proxy_pass http://journey_service/admin/peers/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $request_id;
        }

        location /admin/ {
            limit_req zone=general burst=20 nodelay;
            proxy_pass http://journey_service/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $request_id;
        }

        # Default: return 404
        location / {
            return 404 '{"error": "Not Found", "message": "Unknown API endpoint"}';
            add_header Content-Type application/json;
        }
    }
}
