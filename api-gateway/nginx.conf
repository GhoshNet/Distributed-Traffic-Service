worker_processes auto;
error_log /var/log/nginx/error.log debug;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/json;

    # Verbose log format — captures routing decision, upstream chosen, timings
    log_format verbose '$time_iso8601 | $remote_addr | $request_method $scheme://$host$request_uri | '
                       'status=$status | upstream=$upstream_addr | '
                       'upstream_status=$upstream_status | '
                       'req_time=${request_time}s | upstream_time=${upstream_response_time}s | '
                       'bytes_sent=$bytes_sent | referer="$http_referer" | '
                       'user_agent="$http_user_agent" | request_id=$request_id';

    # Per-request debug log — logs every proxy decision with destination
    log_format routing '>>> ROUTING | $time_iso8601 | $request_method $request_uri '
                       '-> upstream=[$upstream_addr] status=$status request_id=$request_id';

    access_log /var/log/nginx/access.log verbose;
    access_log /var/log/nginx/routing.log routing;
    access_log /dev/stdout verbose;

    proxy_connect_timeout 10s;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    keepalive_timeout 65;

    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=booking:10m rate=10r/s;

    # Docker embedded DNS — re-resolves hostnames every 5s
    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 5s;

    server {
        listen 80;
        server_name localhost;

        # Attach a unique request ID to every request for tracing
        add_header X-Request-ID $request_id always;

        # ==========================================
        # Health check — gateway self + journey-service
        # ==========================================
        location = /health {
            access_log /dev/stdout verbose;
            set $svc "journey-service:8000";
            proxy_pass http://$svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $request_id;
            proxy_connect_timeout 3s;
            proxy_read_timeout 5s;
        }

        # ==========================================
        # User Service
        # ==========================================
        location /api/users/ {
            access_log /dev/stdout verbose;
            limit_req zone=auth burst=10 nodelay;
            set $svc "user-service:8000";
            proxy_pass http://$svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        location /internal/users/ {
            access_log /dev/stdout verbose;
            set $svc "user-service:8000";
            proxy_pass http://$svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $request_id;
        }

        location /internal/vehicles/ {
            access_log /dev/stdout verbose;
            set $svc "user-service:8000";
            proxy_pass http://$svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $request_id;
        }

        location /internal/peers/ {
            access_log /dev/stdout verbose;
            set $svc "user-service:8000";
            proxy_pass http://$svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $request_id;
        }

        # ==========================================
        # Journey Service
        # ==========================================
        location /api/journeys/ {
            access_log /dev/stdout verbose;
            limit_req zone=booking burst=20 nodelay;
            set $svc "journey-service:8000";
            proxy_pass http://$svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        location /internal/journeys/ {
            access_log /dev/stdout verbose;
            set $svc "journey-service:8000";
            proxy_pass http://$svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $request_id;
        }

        # ==========================================
        # Conflict Service
        # ==========================================
        location /api/conflicts/ {
            access_log /dev/stdout verbose;
            limit_req zone=general burst=10 nodelay;
            set $svc "conflict-service:8000";
            proxy_pass http://$svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # ==========================================
        # Notification Service
        # ==========================================
        location /api/notifications/ {
            access_log /dev/stdout verbose;
            limit_req zone=general burst=10 nodelay;
            set $svc "notification-service:8000";
            proxy_pass http://$svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        location /ws/notifications/ {
            access_log /dev/stdout verbose;
            set $svc "notification-service:8000";
            proxy_pass http://$svc;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 86400;
        }

        # ==========================================
        # Enforcement Service
        # ==========================================
        location /api/enforcement/ {
            access_log /dev/stdout verbose;
            limit_req zone=general burst=20 nodelay;
            set $svc "enforcement-service:8000";
            proxy_pass http://$svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # ==========================================
        # Analytics Service
        # ==========================================
        location /api/analytics/ {
            access_log /dev/stdout verbose;
            limit_req zone=general burst=10 nodelay;
            set $svc "analytics-service:8000";
            proxy_pass http://$svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # ==========================================
        # Node health / partitions / admin — journey-service
        # ==========================================
        location /health/nodes {
            access_log /dev/stdout verbose;
            limit_req zone=general burst=10 nodelay;
            set $svc "journey-service:8000";
            proxy_pass http://$svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $request_id;
        }

        location /health/partitions {
            access_log /dev/stdout verbose;
            limit_req zone=general burst=10 nodelay;
            set $svc "journey-service:8000";
            proxy_pass http://$svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $request_id;
        }

        location /admin/peers/ {
            access_log /dev/stdout verbose;
            limit_req zone=general burst=10 nodelay;
            set $svc "journey-service:8000";
            proxy_pass http://$svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $request_id;
        }

        location /admin/ {
            access_log /dev/stdout verbose;
            limit_req zone=general burst=20 nodelay;
            set $svc "journey-service:8000";
            proxy_pass http://$svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $request_id;
        }

        # ==========================================
        # Frontend — catch-all, must be last
        # ==========================================
        location / {
            access_log /dev/stdout verbose;
            set $svc "frontend:80";
            proxy_pass http://$svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
        }
    }
}
