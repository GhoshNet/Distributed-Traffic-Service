worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/json;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream=$upstream_addr response_time=$upstream_response_time';
    access_log /var/log/nginx/access.log main;

    proxy_connect_timeout 10s;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    keepalive_timeout 65;

    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=booking:10m rate=10r/s;

    # Docker embedded DNS — re-resolves hostnames every 5s when used with
    # set $var + proxy_pass http://$var  (no static upstream blocks needed)
    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 5s;

    server {
        listen 80;
        server_name localhost;

        # ==========================================
        # Health check — journey-service
        # ==========================================
        location = /health {
            set $svc "journey-service:8000";
            proxy_pass http://$svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 3s;
            proxy_read_timeout 5s;
        }

        # ==========================================
        # User Service
        # ==========================================
        location /api/users/ {
            limit_req zone=auth burst=10 nodelay;
            set $svc "user-service:8000";
            proxy_pass http://$svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        location /internal/users/ {
            set $svc "user-service:8000";
            proxy_pass http://$svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /internal/vehicles/ {
            set $svc "user-service:8000";
            proxy_pass http://$svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /internal/peers/ {
            set $svc "user-service:8000";
            proxy_pass http://$svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ==========================================
        # Journey Service
        # ==========================================
        location /api/journeys/ {
            limit_req zone=booking burst=20 nodelay;
            set $svc "journey-service:8000";
            proxy_pass http://$svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # ==========================================
        # Conflict Service
        # ==========================================
        location /api/conflicts/ {
            limit_req zone=general burst=10 nodelay;
            set $svc "conflict-service:8000";
            proxy_pass http://$svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # ==========================================
        # Notification Service
        # ==========================================
        location /api/notifications/ {
            limit_req zone=general burst=10 nodelay;
            set $svc "notification-service:8000";
            proxy_pass http://$svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        location /ws/notifications/ {
            set $svc "notification-service:8000";
            proxy_pass http://$svc;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # ==========================================
        # Enforcement Service
        # ==========================================
        location /api/enforcement/ {
            limit_req zone=general burst=20 nodelay;
            set $svc "enforcement-service:8000";
            proxy_pass http://$svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # ==========================================
        # Analytics Service
        # ==========================================
        location /api/analytics/ {
            limit_req zone=general burst=10 nodelay;
            set $svc "analytics-service:8000";
            proxy_pass http://$svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # ==========================================
        # Node health / partitions / admin — journey-service
        # ==========================================
        location /health/nodes {
            limit_req zone=general burst=10 nodelay;
            set $svc "journey-service:8000";
            proxy_pass http://$svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health/partitions {
            limit_req zone=general burst=10 nodelay;
            set $svc "journey-service:8000";
            proxy_pass http://$svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /admin/peers/ {
            limit_req zone=general burst=10 nodelay;
            set $svc "journey-service:8000";
            proxy_pass http://$svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /admin/ {
            limit_req zone=general burst=20 nodelay;
            set $svc "journey-service:8000";
            proxy_pass http://$svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Default 404
        location / {
            return 404 '{"error": "Not Found", "message": "Unknown API endpoint"}';
            add_header Content-Type application/json;
        }
    }
}
