<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JourneyBook - Live Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-title">JourneyBook</div>
    <div class="auth-sub">Next-Gen Distributed Booking Engine</div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuth('login')">Sign In</button>
      <button class="auth-tab" onclick="switchAuth('register')">Register</button>
    </div>

    <!-- Login -->
    <form id="login-form" onsubmit="login(event)">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" placeholder="agent@traffic.test" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" placeholder="••••••••" required>
      </div>
      <button class="btn btn-primary btn-full" type="submit">Access Terminal</button>
    </form>

    <!-- Register -->
    <form id="register-form" style="display:none;" onsubmit="register(event)">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input class="form-input" type="text" placeholder="John Doe" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" required>
      </div>
      <div class="form-group">
        <label class="form-label">License Number</label>
        <input class="form-input" type="text" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" required>
      </div>
      <button class="btn btn-primary btn-full" type="submit">Create Account</button>
    </form>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="app-inner">
    <!-- Sidebar -->
    <nav id="sidebar">
      <div class="sidebar-logo">JB</div>
      <button class="nav-btn active" id="nav-map" onclick="go('map')" title="Live Map">🗺️</button>
      <button class="nav-btn" id="nav-dash" onclick="go('dash')" title="Dashboard">📊</button>
      <button class="nav-btn" id="nav-journeys" onclick="go('journeys')" title="Journeys">🛣️</button>
      <div class="sidebar-spacer"></div>
      <button class="nav-btn" onclick="logout()" title="Logout">🚪</button>
    </nav>

    <!-- Main -->
    <div id="main">
      <div id="topbar">
        <div class="greeting">
          <h2>Welcome, <span id="user-name">User</span></h2>
          <p>System Operating Nominally</p>
        </div>
        <div class="topbar-right">
          <div id="ws-status"><div id="ws-dot" class="ws-dot"></div> Live Data</div>
        </div>
      </div>

      <!-- MAP VIEW -->
      <div id="view-map" class="view active">
        <div class="g-map">
          <div class="card" style="padding:4px">
            <div id="map"></div>
          </div>
        </div>
      </div>

      <!-- DASH VIEW -->
      <div id="view-dash" class="view">
        <div class="g4">
          <div class="card">
            <div class="stat-label">Your Points Balance</div>
            <div class="stat-value" id="stat-points" style="color:var(--secondary)">0</div>
          </div>
          <div class="card">
            <div class="stat-label">Total Events Today</div>
            <div class="stat-value" id="stat-total">0</div>
          </div>
          <div class="card">
            <div class="stat-label">Confirmed Journeys</div>
            <div class="stat-value" id="stat-conf" style="color:var(--success)">0</div>
          </div>
          <div class="card">
            <div class="stat-label">Rejected Journeys</div>
            <div class="stat-value" id="stat-rej" style="color:var(--danger)">0</div>
          </div>
        </div>
        <div class="card" style="margin-top:20px">
          <div class="card-title">Points History</div>
          <div id="points-history" class="item-list"></div>
        </div>
      </div>

      <!-- JOURNEYS VIEW -->
      <div id="view-journeys" class="view">
        <div class="g-split-3">
          <div class="card">
            <div class="card-title">Book New Journey</div>
            <form onsubmit="bookJourney(event)">
              <div class="form-group">
                <label class="form-label">Origin</label>
                <div class="autocomplete-wrapper">
                  <input class="form-input" type="text" id="j-origin" placeholder="Search for a location..." autocomplete="off" required>
                  <div class="autocomplete-results" id="j-origin-results"></div>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Destination</label>
                <div class="autocomplete-wrapper">
                  <input class="form-input" type="text" id="j-dest" placeholder="Search for a location..." autocomplete="off" required>
                  <div class="autocomplete-results" id="j-dest-results"></div>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Departure</label>
                <input class="form-input" type="datetime-local" id="j-depart" required>
              </div>
              <div class="form-group">
                <label class="form-label">Duration (min)</label>
                <input class="form-input" type="number" id="j-dur" value="120" required>
              </div>
              <div class="form-group">
                <label class="form-label">Vehicle</label>
                <select class="form-input" id="j-vehicle" required>
                  <option value="">Select a registered vehicle...</option>
                </select>
              </div>
              <button class="btn btn-primary btn-full" type="submit">Submit Request</button>
            </form>
          </div>
          <div class="card">
            <div class="card-title">My Vehicles
              <button class="btn btn-sm btn-primary" onclick="showAddVehicle()">+ Add</button>
            </div>
            <div id="add-vehicle-form" style="display:none; margin-bottom:16px;">
              <div class="form-group">
                <input class="form-input" type="text" id="v-plate" placeholder="Registration (e.g. ABC-1234)">
              </div>
              <div class="form-group">
                <select class="form-input" id="v-type">
                  <option value="CAR">CAR</option>
                  <option value="MOTORCYCLE">MOTORCYCLE</option>
                  <option value="VAN">VAN</option>
                  <option value="TRUCK">TRUCK</option>
                  <option value="BUS">BUS</option>
                </select>
              </div>
              <button class="btn btn-primary btn-full" onclick="addVehicle()">Register Vehicle</button>
            </div>
            <div id="vehicle-list" class="item-list"></div>
          </div>
          <div class="card">
            <div class="card-title">My Journey Logs</div>
            <div id="journey-list" class="item-list"></div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="app.js"></script>
</body>
</html>
