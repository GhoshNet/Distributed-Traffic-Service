volumes:
  rabbitmq_data:
  rabbitmq_data_2:
  rabbitmq_data_3:
  redis_data:
  pg_users_data:
  pg_users_replica_data:
  pg_journeys_data:
  pg_journeys_replica_data:
  pg_conflicts_data:
  pg_conflicts_replica_data:
  pg_analytics_data:
  pg_analytics_replica_data:


networks:
  journey-net:
    driver: bridge
