    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U conflicts_user -d conflicts_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - journey-net

  postgres-conflicts-replica:
    image: postgres:16-alpine
    environment:
      PGUSER: conflicts_user
      PGPASSWORD: conflicts_pass
    volumes:
      - pg_conflicts_replica_data:/var/lib/postgresql/data
    entrypoint: |
      bash -c "
      chown -R postgres:postgres /var/lib/postgresql/data
      chmod 700 /var/lib/postgresql/data
      if [ ! -f /var/lib/postgresql/data/PG_VERSION ]; then
        echo 'Initializing replica from primary...'
        until pg_isready -h postgres-conflicts -U conflicts_user -d conflicts_db; do sleep 2; done
        gosu postgres pg_basebackup -h postgres-conflicts -U conflicts_user -D /var/lib/postgresql/data -Fp -Xs -P -R
      fi
      exec gosu postgres postgres -c hot_standby=on
      "
    depends_on:
      postgres-conflicts:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U conflicts_user -d conflicts_db" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - journey-net

  postgres-analytics:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: analytics_db
      POSTGRES_USER: analytics_user
      POSTGRES_PASSWORD: analytics_pass
    volumes:
      - pg_analytics_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
        -c wal_level=replica
        -c max_wal_senders=3
        -c max_replication_slots=3
        -c hot_standby=on
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U analytics_user -d analytics_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - journey-net

  postgres-analytics-replica:
    image: postgres:16-alpine
    environment:
      PGUSER: analytics_user
      PGPASSWORD: analytics_pass
    volumes:
      - pg_analytics_replica_data:/var/lib/postgresql/data
    entrypoint: |
      bash -c "
      chown -R postgres:postgres /var/lib/postgresql/data
      chmod 700 /var/lib/postgresql/data
      if [ ! -f /var/lib/postgresql/data/PG_VERSION ]; then
        echo 'Initializing replica from primary...'
        until pg_isready -h postgres-analytics -U analytics_user -d analytics_db; do sleep 2; done
        gosu postgres pg_basebackup -h postgres-analytics -U analytics_user -D /var/lib/postgresql/data -Fp -Xs -P -R
      fi
      exec gosu postgres postgres -c hot_standby=on
      "
    depends_on:
      postgres-analytics:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U analytics_user -d analytics_db" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - journey-net

  # ==========================================
  # Application Services
  # ==========================================

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://users_user:users_pass@postgres-users:5432/users_db
      DATABASE_READ_URL: postgresql+asyncpg://users_user:users_pass@postgres-users-replica:5432/users_db
      REDIS_URL: redis://redis:6379/0
      REDIS_SENTINEL_ADDRS: redis-sentinel:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      REDIS_MASTER_NAME: mymaster
      RABBITMQ_URL: amqp://journey_admin:journey_pass@rabbitmq:5672/journey_vhost
      JWT_SECRET: keefkfwjNBEFINoodwoedibIOEJFKWNFIjjjdIIIOOP
      SERVICE_NAME: user-service
    depends_on:
      postgres-users:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - journey-net

  journey-service:
    build:
      context: .
      dockerfile: journey-service/Dockerfile
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://journeys_user:journeys_pass@postgres-journeys:5432/journeys_db
      DATABASE_READ_URL: postgresql+asyncpg://journeys_user:journeys_pass@postgres-journeys-replica:5432/journeys_db
      REDIS_URL: redis://redis:6379/1
      REDIS_SENTINEL_ADDRS: redis-sentinel:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      REDIS_MASTER_NAME: mymaster
      RABBITMQ_URL: amqp://journey_admin:journey_pass@rabbitmq:5672/journey_vhost
      CONFLICT_SERVICE_URL: http://conflict-service:8000
      JWT_SECRET: keefkfwjNBEFINoodwoedibIOEJFKWNFIjjjdIIIOOP
      SERVICE_NAME: journey-service
    depends_on:
      postgres-journeys:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - journey-net

  conflict-service:
    build:
      context: .
      dockerfile: conflict-service/Dockerfile
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: postgresql://conflicts_user:conflicts_pass@postgres-conflicts:5432/conflicts_db
      REDIS_URL: redis://redis:6379/2
      REDIS_SENTINEL_ADDRS: redis-sentinel:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      REDIS_MASTER_NAME: mymaster
      RABBITMQ_URL: amqp://journey_admin:journey_pass@rabbitmq:5672/journey_vhost
      JWT_SECRET: keefkfwjNBEFINoodwoedibIOEJFKWNFIjjjdIIIOOP
      SERVICE_NAME: conflict-service
    depends_on:
      postgres-conflicts:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - journey-net

  notification-service:
    build:
