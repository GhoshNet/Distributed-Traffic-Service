version: '3.8'

services:
  # ==========================================
  # Infrastructure Services
  # ==========================================

  frontend:
    image: nginx:1.25-alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    restart: unless-stopped
    networks:
      - journey-net

  haproxy:
    image: haproxy:2.8-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./api-gateway/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - api-gateway-1
      - api-gateway-2
    restart: unless-stopped
    networks:
      - journey-net

  api-gateway-1:
    image: nginx:1.25-alpine
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      user-service:
        condition: service_healthy
      journey-service:
        condition: service_healthy
      enforcement-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - journey-net

  api-gateway-2:
    image: nginx:1.25-alpine
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      user-service:
        condition: service_healthy
      journey-service:
        condition: service_healthy
      enforcement-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - journey-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_ERLANG_COOKIE: "journey_cluster_cookie"
      RABBITMQ_DEFAULT_USER: journey_admin
      RABBITMQ_DEFAULT_PASS: journey_pass
      RABBITMQ_DEFAULT_VHOST: journey_vhost
      RABBITMQ_NODENAME: rabbit@rabbitmq
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - journey-net

  rabbitmq-2:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_ERLANG_COOKIE: "journey_cluster_cookie"
      RABBITMQ_DEFAULT_USER: journey_admin
      RABBITMQ_DEFAULT_PASS: journey_pass
      RABBITMQ_DEFAULT_VHOST: journey_vhost
      RABBITMQ_NODENAME: rabbit@rabbitmq-2
    volumes:
      - rabbitmq_data_2:/var/lib/rabbitmq
    command: >
      sh -c "
      rabbitmq-server -detached &&
      sleep 10 &&
      rabbitmqctl stop_app &&
      rabbitmqctl join_cluster rabbit@rabbitmq &&
      rabbitmqctl start_app &&
      sleep infinity
      "
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - journey-net

  rabbitmq-3:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_ERLANG_COOKIE: "journey_cluster_cookie"
      RABBITMQ_DEFAULT_USER: journey_admin
      RABBITMQ_DEFAULT_PASS: journey_pass
      RABBITMQ_DEFAULT_VHOST: journey_vhost
      RABBITMQ_NODENAME: rabbit@rabbitmq-3
    volumes:
      - rabbitmq_data_3:/var/lib/rabbitmq
    command: >
      sh -c "
      rabbitmq-server -detached &&
      sleep 15 &&
      rabbitmqctl stop_app &&
      rabbitmqctl join_cluster rabbit@rabbitmq &&
      rabbitmqctl start_app &&
      sleep infinity
      "
    depends_on:
      rabbitmq-2:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - journey-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - journey-net

  redis-replica:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --replicaof redis 6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - journey-net

  redis-sentinel:
    image: redis:7-alpine
    command:
      - sh
      - -c
      - |
        until REDIS_IP=$$(getent hosts redis | awk '{print $$1; exit}') && [ -n "$$REDIS_IP" ]; do
          echo "Waiting for redis DNS..."
          sleep 2
        done
        echo "sentinel monitor mymaster $$REDIS_IP 6379 2" > /tmp/sentinel.conf
        echo "sentinel down-after-milliseconds mymaster 5000" >> /tmp/sentinel.conf
        echo "sentinel failover-timeout mymaster 10000" >> /tmp/sentinel.conf
        echo "sentinel parallel-syncs mymaster 1" >> /tmp/sentinel.conf
        exec redis-sentinel /tmp/sentinel.conf
    ports:
      - "26379:26379"
    depends_on:
      redis:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - journey-net

  redis-sentinel-2:
    image: redis:7-alpine
    command:
      - sh
      - -c
      - |
        until REDIS_IP=$$(getent hosts redis | awk '{print $$1; exit}') && [ -n "$$REDIS_IP" ]; do
          echo "Waiting for redis DNS..."
          sleep 2
        done
        echo "sentinel monitor mymaster $$REDIS_IP 6379 2" > /tmp/sentinel.conf
        echo "sentinel down-after-milliseconds mymaster 5000" >> /tmp/sentinel.conf
        echo "sentinel failover-timeout mymaster 10000" >> /tmp/sentinel.conf
        echo "sentinel parallel-syncs mymaster 1" >> /tmp/sentinel.conf
        exec redis-sentinel /tmp/sentinel.conf
    depends_on:
      redis:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - journey-net

  redis-sentinel-3:
    image: redis:7-alpine
    command:
      - sh
      - -c
      - |
        until REDIS_IP=$$(getent hosts redis | awk '{print $$1; exit}') && [ -n "$$REDIS_IP" ]; do
          echo "Waiting for redis DNS..."
          sleep 2
        done
        echo "sentinel monitor mymaster $$REDIS_IP 6379 2" > /tmp/sentinel.conf
        echo "sentinel down-after-milliseconds mymaster 5000" >> /tmp/sentinel.conf
        echo "sentinel failover-timeout mymaster 10000" >> /tmp/sentinel.conf
        echo "sentinel parallel-syncs mymaster 1" >> /tmp/sentinel.conf
        exec redis-sentinel /tmp/sentinel.conf
    depends_on:
      redis:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - journey-net

  # ==========================================
  # Databases (one per service)
  # ==========================================

  postgres-users:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: users_user
      POSTGRES_PASSWORD: users_pass
    volumes:
      - pg_users_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
        -c wal_level=replica
        -c max_wal_senders=3
        -c max_replication_slots=3
        -c hot_standby=on
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U users_user -d users_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - journey-net

  postgres-users-replica:
    image: postgres:16-alpine
    environment:
      PGUSER: users_user
      PGPASSWORD: users_pass
    volumes:
      - pg_users_replica_data:/var/lib/postgresql/data
    entrypoint: |
      bash -c "
      chown -R postgres:postgres /var/lib/postgresql/data
      chmod 700 /var/lib/postgresql/data
      if [ ! -f /var/lib/postgresql/data/PG_VERSION ]; then
        echo 'Initializing replica from primary...'
        until pg_isready -h postgres-users -U users_user -d users_db; do sleep 2; done
        gosu postgres pg_basebackup -h postgres-users -U users_user -D /var/lib/postgresql/data -Fp -Xs -P -R
      fi
      exec gosu postgres postgres -c hot_standby=on
      "
    depends_on:
      postgres-users:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U users_user -d users_db" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - journey-net

  postgres-journeys:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: journeys_db
      POSTGRES_USER: journeys_user
      POSTGRES_PASSWORD: journeys_pass
    volumes:
      - pg_journeys_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
        -c wal_level=replica
        -c max_wal_senders=3
        -c max_replication_slots=3
        -c hot_standby=on
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U journeys_user -d journeys_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - journey-net

  postgres-journeys-replica:
    image: postgres:16-alpine
    environment:
      PGUSER: journeys_user
      PGPASSWORD: journeys_pass
    volumes:
      - pg_journeys_replica_data:/var/lib/postgresql/data
    entrypoint: |
      bash -c "
      chown -R postgres:postgres /var/lib/postgresql/data
      chmod 700 /var/lib/postgresql/data
      if [ ! -f /var/lib/postgresql/data/PG_VERSION ]; then
        echo 'Initializing replica from primary...'
        until pg_isready -h postgres-journeys -U journeys_user -d journeys_db; do sleep 2; done
        gosu postgres pg_basebackup -h postgres-journeys -U journeys_user -D /var/lib/postgresql/data -Fp -Xs -P -R
      fi
      exec gosu postgres postgres -c hot_standby=on
      "
    depends_on:
      postgres-journeys:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U journeys_user -d journeys_db" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - journey-net

  postgres-conflicts:
    image: postgres:16-alpine
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: conflicts_db
      POSTGRES_USER: conflicts_user
      POSTGRES_PASSWORD: conflicts_pass
    volumes:
      - pg_conflicts_data:/var/lib/postgresql/data
