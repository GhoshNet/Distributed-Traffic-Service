{{/*
  traffic-secrets — composed app-side credentials.

  Each DB URL is built at render time from the structured values in
  `.Values.secrets.databases.<svc>` so the password is defined ONCE (via the
  YAML anchors in values.yaml) and every consumer stays in sync.
*/}}
{{- $db := .Values.secrets.databases -}}
{{- $rmq := .Values.secrets -}}
{{- $redisPass := .Values.secrets.redisPassword -}}
apiVersion: v1
kind: Secret
metadata:
  name: traffic-secrets
  labels:
    app.kubernetes.io/part-of: traffic-service
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  # --- App secrets ----------------------------------------------------
  jwt-secret: {{ .Values.secrets.jwtSecret | quote }}
  audit-hmac-secret: {{ .Values.secrets.auditHmacSecret | quote }}

  # --- RabbitMQ URL ---------------------------------------------------
  rabbitmq-url: {{ printf "amqp://%s:%s@rabbitmq:5672/%s"
      $rmq.rabbitmqUsername
      $rmq.rabbitmqPassword
      $rmq.rabbitmqVhost | quote }}

  # --- Redis URLs (one per service, DB index 0..5) --------------------
  user-service-redis-url:         {{ printf "redis://:%s@redis:6379/0" $redisPass | quote }}
  journey-service-redis-url:      {{ printf "redis://:%s@redis:6379/1" $redisPass | quote }}
  conflict-service-redis-url:     {{ printf "redis://:%s@redis:6379/2" $redisPass | quote }}
  notification-service-redis-url: {{ printf "redis://:%s@redis:6379/3" $redisPass | quote }}
  enforcement-service-redis-url:  {{ printf "redis://:%s@redis:6379/4" $redisPass | quote }}
  analytics-service-redis-url:    {{ printf "redis://:%s@redis:6379/5" $redisPass | quote }}

  # --- Postgres URLs (users, journeys use asyncpg driver) -------------
  users-database-url: {{ printf "postgresql+asyncpg://%s:%s@%s:5432/%s"
      $db.users.username $db.users.password $db.users.host $db.users.database | quote }}
  users-database-read-url: {{ printf "postgresql+asyncpg://%s:%s@%s:5432/%s"
      $db.users.username $db.users.password $db.users.readHost $db.users.database | quote }}

  journeys-database-url: {{ printf "postgresql+asyncpg://%s:%s@%s:5432/%s"
      $db.journeys.username $db.journeys.password $db.journeys.host $db.journeys.database | quote }}
  journeys-database-read-url: {{ printf "postgresql+asyncpg://%s:%s@%s:5432/%s"
      $db.journeys.username $db.journeys.password $db.journeys.readHost $db.journeys.database | quote }}

  conflicts-database-url: {{ printf "postgresql://%s:%s@%s:5432/%s"
      $db.conflicts.username $db.conflicts.password $db.conflicts.host $db.conflicts.database | quote }}

  analytics-database-url: {{ printf "postgresql://%s:%s@%s:5432/%s"
      $db.analytics.username $db.analytics.password $db.analytics.host $db.analytics.database | quote }}
  analytics-database-read-url: {{ printf "postgresql://%s:%s@%s:5432/%s"
      $db.analytics.username $db.analytics.password $db.analytics.readHost $db.analytics.database | quote }}
