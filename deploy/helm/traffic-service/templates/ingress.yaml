{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: traffic-ingress
  labels:
    app.kubernetes.io/part-of: traffic-service
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api/users(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: user-service
                port:
                  number: 8000
          - path: /api/journeys(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: journey-service
                port:
                  number: 8000
          - path: /api/conflicts(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: conflict-service
                port:
                  number: 8000
          - path: /api/notifications(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: notification-service
                port:
                  number: 8000
          - path: /api/enforcement(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: enforcement-service
                port:
                  number: 8000
          - path: /api/analytics(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: analytics-service
                port:
                  number: 8000
{{- end }}
